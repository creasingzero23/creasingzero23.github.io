<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模特拍摄 | 孙剑杰作品集</title>
    <link rel="stylesheet" href="https://static-resources.nuwax.com/tailwind.min.css">
    <link href="https://static-resources.nuwax.com/g-fonts.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00f0ff;
            --secondary: #7b2dff;
            --dark: #0a0a0f;
            --dark-card: #1a1a24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--dark);
            color: #ffffff;
            overflow-x: hidden;
        }

        .font-tech {
            font-family: 'Orbitron', monospace;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--dark);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            border-radius: 3px;
        }

        /* Background Effects */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            background: rgba(10, 10, 15, 0.9);
            border-bottom: 1px solid rgba(0, 240, 255, 0.1);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: var(--primary);
        }

        /* Image Container */
        .image-showcase {
            position: relative;
            background: var(--dark-card);
            border: 1px solid rgba(0, 240, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.4s;
        }

        .image-showcase:hover {
            border-color: rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.15);
        }

        .image-showcase img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Title Styling */
        .page-title {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Info Card */
        .info-card {
            background: rgba(26, 26, 36, 0.8);
            border: 1px solid rgba(0, 240, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
        }

        /* Tag */
        .tag {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(0, 240, 255, 0.1);
            color: var(--primary);
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid rgba(0, 240, 255, 0.2);
        }

        /* Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        /* Image Modal */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .image-modal.active {
            display: flex;
            opacity: 1;
        }

        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 60px rgba(0, 240, 255, 0.3);
        }

        .image-modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: #fff;
            cursor: pointer;
            transition: color 0.3s;
            line-height: 1;
        }

        .image-modal-close:hover {
            color: var(--primary);
        }

        .image-showcase {
            cursor: pointer;
        }

        .image-showcase:hover::after {
            content: '点击放大';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .image-showcase:hover::after {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="bg-grid"></div>

    <!-- Navigation -->
    <nav class="nav">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="back-btn">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                <span class="font-medium">返回作品集</span>
            </a>
            <span class="font-tech text-sm" style="color: var(--primary);">08 / 模特拍摄</span>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="relative z-10 pt-24 pb-16 px-6">
        <div class="max-w-6xl mx-auto">
            <!-- Header -->
            <div class="text-center mb-12 animate-fade-in">
                <span class="tag mb-4">人像摄影</span>
                <h1 class="text-4xl md:text-6xl font-bold page-title mb-6">模特拍摄</h1>
                <p class="text-gray-400 text-lg max-w-2xl mx-auto">
                    参与产品模特的拍摄工作与买家秀展示拍摄，打造吸引人的视觉效果
                </p>
            </div>

            <!-- Project Info -->
            <div class="info-card p-8 mb-12 animate-fade-in" style="animation-delay: 0.2s;">
                <div class="grid md:grid-cols-3 gap-6">
                    <div>
                        <p class="text-gray-500 text-sm mb-2">项目类型</p>
                        <p class="font-medium">模特摄影</p>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm mb-2">拍摄内容</p>
                        <p class="font-medium">产品模特 · 买家秀</p>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm mb-2">使用工具</p>
                        <p class="font-medium">单反相机 · 影棚设备</p>
                    </div>
                </div>
            </div>

            <!-- Image Gallery -->
            <div class="image-showcase animate-fade-in" style="animation-delay: 0.3s;">
                <img src="portfolio_images/page_8.jpg" alt="模特拍摄作品">
            </div>

            <!-- Description -->
            <div class="info-card p-8 mt-12 animate-fade-in" style="animation-delay: 0.4s;">
                <h3 class="font-tech text-xl mb-4" style="color: var(--primary);">项目说明</h3>
                <p class="text-gray-300 leading-relaxed">
                    负责产品模特拍摄工作和买家秀展示拍摄，通过专业的布光和构图技巧，
                    展现产品在模特身上的最佳效果。同时负责买家秀的拍摄指导，
                    帮助品牌打造真实而吸引人的用户展示内容，提升产品的视觉吸引力和销售转化率。
                </p>
            </div>

            <!-- Navigation -->
            <div class="flex justify-between items-center mt-16 animate-fade-in" style="animation-delay: 0.5s;">
                <a href="project-clothing.html" class="px-6 py-3 border border-cyan-500/30 rounded-full hover:bg-cyan-500/10 transition-all">
                    ← 上一个项目
                </a>
                <a href="project-healthcare.html" class="px-6 py-3 bg-gradient-to-r from-cyan-500 to-purple-600 rounded-full hover:shadow-lg hover:shadow-cyan-500/25 transition-all">
                    下一个项目 →
                </a>
            </div>
        </div>
    </main>

    <script>
        // Scroll animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.image-showcase, .info-card').forEach(el => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(20px)';
            el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
            observer.observe(el);
        });
    </script>

    <!-- Image Modal -->
    <div class="image-modal" id="imageModal">
        <span class="image-modal-close" id="modalClose">&times;</span>
        <img src="" alt="" id="modalImage">
    </div>

    <script>
        // Image Modal functionality
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');
        const closeBtn = document.getElementById('modalClose');

        document.querySelectorAll('.image-showcase img').forEach(img => {
            img.addEventListener('click', function() {
                modal.classList.add('active');
                modalImg.src = this.src;
                modalImg.alt = this.alt;
                document.body.style.overflow = 'hidden';
            });
        });

        closeBtn.addEventListener('click', function() {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        });

        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && modal.classList.contains('active')) {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            }
        });
    </script>
</body>
</html>
