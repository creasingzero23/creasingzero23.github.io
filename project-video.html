<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人物口播短视频 | 孙剑杰作品集</title>
    <link rel="stylesheet" href="https://static-resources.nuwax.com/tailwind.min.css">
    <link href="https://static-resources.nuwax.com/g-fonts.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00f0ff;
            --secondary: #7b2dff;
            --accent: #ff2d7a;
            --dark: #0a0a0f;
            --dark-card: #1a1a24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--dark);
            color: #ffffff;
            overflow-x: hidden;
        }

        .font-tech {
            font-family: 'Orbitron', monospace;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--dark);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--accent), var(--secondary));
            border-radius: 3px;
        }

        /* Background Effects */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255, 45, 122, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 45, 122, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            background: rgba(10, 10, 15, 0.9);
            border-bottom: 1px solid rgba(255, 45, 122, 0.2);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: var(--accent);
        }

        /* Image Container */
        .image-showcase {
            position: relative;
            background: var(--dark-card);
            border: 1px solid rgba(255, 45, 122, 0.2);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.4s;
        }

        .image-showcase:hover {
            border-color: rgba(255, 45, 122, 0.5);
            box-shadow: 0 0 40px rgba(255, 45, 122, 0.2);
        }

        .image-showcase img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Title Styling */
        .page-title {
            background: linear-gradient(135deg, var(--accent) 0%, var(--secondary) 50%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Info Card */
        .info-card {
            background: rgba(26, 26, 36, 0.8);
            border: 1px solid rgba(255, 45, 122, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 16px;
        }

        /* Tag */
        .tag {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(255, 45, 122, 0.15);
            color: var(--accent);
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid rgba(255, 45, 122, 0.3);
        }

        /* Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeInUp 0.6s ease-out forwards;
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="bg-grid"></div>

    <!-- Navigation -->
    <nav class="nav">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="back-btn">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                <span class="font-medium">返回作品集</span>
            </a>
            <span class="font-tech text-sm" style="color: var(--accent);">06 / 人物口播短视频</span>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="relative z-10 pt-24 pb-16 px-6">
        <div class="max-w-6xl mx-auto">
            <!-- Header -->
            <div class="text-center mb-12 animate-fade-in">
                <span class="tag mb-4">视频创作</span>
                <h1 class="text-4xl md:text-6xl font-bold page-title mb-6">人物口播短视频</h1>
                <p class="text-gray-400 text-lg max-w-2xl mx-auto">
                    独立负责公司各类产品的人物口播及剧情短视频拍摄与剪辑工作，从脚本策划到成片输出
                </p>
            </div>

            <!-- Project Info -->
            <div class="info-card p-8 mb-12 animate-fade-in" style="animation-delay: 0.2s;">
                <div class="grid md:grid-cols-3 gap-6">
                    <div>
                        <p class="text-gray-500 text-sm mb-2">项目类型</p>
                        <p class="font-medium">短视频创作</p>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm mb-2">工作内容</p>
                        <p class="font-medium">拍摄 · 剪辑 · 后期</p>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm mb-2">使用工具</p>
                        <p class="font-medium">PR · AE · 剪映</p>
                    </div>
                </div>
            </div>

            <!-- Image Gallery -->
            <div class="grid md:grid-cols-2 gap-8 mb-8">
                <div class="image-showcase animate-fade-in" style="animation-delay: 0.3s;">
                    <img src="portfolio_images/page_12.jpg" alt="人物口播短视频拍摄">
                </div>
                <div class="image-showcase animate-fade-in" style="animation-delay: 0.4s;">
                    <img src="portfolio_images/page_13.jpg" alt="剧情短视频剪辑">
                </div>
            </div>

            <!-- Description -->
            <div class="info-card p-8 mt-12 animate-fade-in" style="animation-delay: 0.5s;">
                <h3 class="font-tech text-xl mb-4" style="color: var(--accent);">项目说明</h3>
                <p class="text-gray-300 leading-relaxed">
                    负责公司各类产品的人物口播短视频和剧情类短视频的拍摄与剪辑工作。
                    从脚本策划、分镜设计，到现场拍摄、演员指导，再到后期剪辑、特效添加、配乐字幕，
                    全流程把控视频质量。通过精准的镜头语言和流畅的剪辑节奏，
                    提升产品的传播效果和用户粘性，为品牌营销提供高质量的短视频内容。
                </p>
            </div>

            <!-- Navigation -->
            <div class="flex justify-between items-center mt-16 animate-fade-in" style="animation-delay: 0.6s;">
                <a href="project-healthcare.html" class="px-6 py-3 border border-pink-500/30 rounded-full hover:bg-pink-500/10 transition-all">
                    ← 上一个项目
                </a>
                <a href="project-advertising.html" class="px-6 py-3 bg-gradient-to-r from-pink-500 to-purple-600 rounded-full hover:shadow-lg hover:shadow-pink-500/25 transition-all">
                    下一个项目 →
                </a>
            </div>
        </div>
    </main>

    <script>
        // Scroll animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.image-showcase, .info-card').forEach(el => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(20px)';
            el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
            observer.observe(el);
        });
    </script>
</body>
</html>
